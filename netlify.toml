[build]
  command = "npm run build"
  publish = "dist/"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/promo"
  to = "/promo/fr/"
  status = 302

[[redirects]]
  from = "/promo/"
  to = "/promo/fr/"
  status = 302

[[headers]]
  for = "/promo/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/promo/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
